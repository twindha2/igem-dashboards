<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wiki Lead Dashboard — UH iGEM 2026</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --scarlet: #C8102E; --scarlet-dark: #9B0C23; --scarlet-deep: #7A091B;
  --scarlet-light: #E8394F; --scarlet-faint: #FDE8EC; --scarlet-mid: #D42A47;
  --indigo: #6366F1; --indigo-dark: #4F46E5; --indigo-deep: #4338CA;
  --indigo-light: #818CF8; --indigo-faint: #E0E7FF; --indigo-mid: #6366F1;
  --white: #FFFFFF; --off-white: #FAFAFA; --slate: #54585A; --slate-light: #888B8D;
  --warm-gray: #E8E3DB; --cream: #FFF8F0;
  --gold: #F6BE00; --gold-light: #FFF3CC;
  --black: #1A1A1A; --emerald: #16A34A; --emerald-light: #DCFCE7;
  --amber: #D97706; --red-alarm: #DC2626;
}
body {
  font-family: 'Inter', 'Segoe UI', system-ui, -apple-system, sans-serif;
  min-height: 100vh; color: var(--black);
  background: linear-gradient(135deg, var(--scarlet) 0%, var(--scarlet-dark) 40%, var(--scarlet-deep) 100%);
  background-attachment: fixed;
}
/* ─── Full-page science background ─── */
.bg-art {
  position: fixed; top: 0; left: 0; width: 100%; height: 100%;
  pointer-events: none; z-index: 0; overflow: hidden;
}
.bg-art svg { position: absolute; }
.page-wrap { position: relative; z-index: 1; min-height: 100vh; }

/* ─── Glass card style ─── */
.glass {
  background: rgba(255,255,255,0.95); backdrop-filter: blur(12px);
  border-radius: 16px; border: 1px solid rgba(255,255,255,0.6);
  box-shadow: 0 4px 24px rgba(0,0,0,0.1);
}

/* ─── Hero Header ─── */
.hero {
  padding: 40px 0 0; text-align: center; position: relative;
}
.hero-inner { max-width: 920px; margin: 0 auto; padding: 0 24px; }
.hero-logo { height: 90px; margin-bottom: 12px; filter: drop-shadow(0 2px 8px rgba(0,0,0,0.3)); }
.hero h1 {
  font-size: 36px; font-weight: 900; color: var(--white); letter-spacing: -0.5px;
  text-shadow: 0 2px 12px rgba(0,0,0,0.3);
}
.hero .lead-name {
  font-size: 20px; font-weight: 500; color: rgba(255,255,255,0.8); margin-top: 4px;
  text-shadow: 0 1px 4px rgba(0,0,0,0.2);
}
.hero .subtitle {
  font-size: 13px; color: rgba(255,255,255,0.6); margin-top: 8px; letter-spacing: 0.5px;
}
.hero .suggestion-tag {
  display: inline-block; font-size: 10px; color: var(--gold); background: rgba(246,190,0,0.15);
  border: 1px solid rgba(246,190,0,0.3); border-radius: 4px; padding: 1px 6px; margin-left: 4px;
  vertical-align: middle;
}
.quote-bar {
  margin: 20px auto 24px; padding: 12px 20px; border-radius: 10px; max-width: 700px;
  background: rgba(255,255,255,0.08); border-left: 3px solid var(--indigo-light);
}
.quote-text { font-size: 13px; color: rgba(255,255,255,0.9); font-style: italic; line-height: 1.5; }
.quote-src { font-size: 11px; color: rgba(255,255,255,0.5); margin-top: 4px; }

/* ═══ NOTIFICATION SYSTEM ═══ */
.notif-widget {
  position: relative; cursor: pointer; display: flex; align-items: center; gap: 12px;
  background: rgba(255,255,255,0.95); border-radius: 14px; padding: 12px 18px;
  box-shadow: 0 4px 20px rgba(0,0,0,0.12); border: 2px solid transparent;
  transition: all 0.3s ease; margin-bottom: 16px;
}
.notif-widget.has-new { border-color: var(--indigo); box-shadow: 0 4px 24px rgba(99,102,241,0.25); }
.notif-widget:hover { transform: translateY(-1px); box-shadow: 0 6px 24px rgba(0,0,0,0.15); }
.notif-logo-wrap {
  width: 44px; height: 44px; display: flex; align-items: center; justify-content: center;
  border-radius: 50%; background: linear-gradient(135deg, var(--indigo) 0%, var(--indigo-dark) 100%);
  flex-shrink: 0; position: relative;
}
.notif-logo-wrap canvas { display: block; }
.notif-badge {
  position: absolute; top: -4px; right: -4px; background: var(--red-alarm); color: white;
  font-size: 11px; font-weight: 800; min-width: 20px; height: 20px; border-radius: 10px;
  display: flex; align-items: center; justify-content: center; padding: 0 5px;
  box-shadow: 0 2px 6px rgba(220,38,38,0.4);
}
.notif-text { flex: 1; }
.notif-text-title { font-size: 14px; font-weight: 700; color: var(--indigo-dark); }
.notif-text-sub { font-size: 12px; color: var(--slate); margin-top: 2px; }
.notif-arrow { color: var(--slate); opacity: 0.4; font-size: 18px; }

.notif-panel-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 10000;
  display: none; align-items: flex-start; justify-content: center; padding-top: 80px;
}
.notif-panel-overlay.open { display: flex; }
.notif-panel {
  background: white; border-radius: 16px; width: 100%; max-width: 480px; max-height: 70vh;
  overflow-y: auto; box-shadow: 0 12px 48px rgba(0,0,0,0.25);
}
.notif-panel-header {
  display: flex; justify-content: space-between; align-items: center;
  padding: 18px 20px; border-bottom: 1px solid rgba(0,0,0,0.08);
  position: sticky; top: 0; background: white; z-index: 1; border-radius: 16px 16px 0 0;
}
.notif-panel-header h3 { margin: 0; font-size: 16px; color: var(--indigo-dark); }
.notif-panel-actions { display: flex; gap: 8px; }
.notif-panel-actions button {
  padding: 6px 12px; border-radius: 8px; border: 1px solid rgba(0,0,0,0.12);
  background: white; cursor: pointer; font-size: 12px; font-weight: 600;
  font-family: inherit; transition: all 0.2s;
}
.notif-panel-actions button:hover { background: rgba(99,102,241,0.06); border-color: var(--indigo); }
.notif-item {
  display: flex; gap: 12px; padding: 14px 20px; border-bottom: 1px solid rgba(0,0,0,0.05);
  transition: background 0.2s;
}
.notif-item.unread { background: rgba(99,102,241,0.06); }
.notif-item:hover { background: rgba(99,102,241,0.04); }
.notif-item-icon {
  width: 36px; height: 36px; border-radius: 10px; display: flex; align-items: center;
  justify-content: center; font-size: 18px; flex-shrink: 0;
}
.notif-item-icon.approve { background: rgba(22,163,74,0.1); }
.notif-item-icon.return { background: rgba(217,119,6,0.1); }
.notif-item-icon.checkin { background: rgba(99,102,241,0.1); }
.notif-item-icon.notes { background: rgba(124,58,237,0.1); }
.notif-item-icon.submit { background: rgba(99,102,241,0.1); }
.notif-item-icon.file { background: rgba(59,130,246,0.1); }
.notif-item-body { flex: 1; min-width: 0; }
.notif-item-msg { font-size: 13px; color: #333; line-height: 1.4; }
.notif-item-msg strong { color: var(--indigo-dark); }
.notif-item-time { font-size: 11px; color: var(--slate); margin-top: 3px; }
.notif-empty { padding: 40px 20px; text-align: center; color: var(--slate); font-size: 13px; }

/* ─── Countdown Row ─── */
.countdown-grid {
  display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px;
  max-width: 1080px; margin: 0 auto 24px; padding: 0 24px;
}
.countdown-card {
  border-radius: 16px; padding: 20px; text-align: center;
  position: relative; overflow: hidden; cursor: default; transition: transform 0.15s, box-shadow 0.15s;
}
.countdown-card.clickable { cursor: pointer; }
.countdown-card.clickable:hover { transform: translateY(-2px); box-shadow: 0 8px 32px rgba(0,0,0,0.15); }
.countdown-card .accent-bar { position: absolute; top: 0; left: 0; right: 0; height: 4px; }
.countdown-card .big-num { font-size: 40px; font-weight: 900; line-height: 1; margin: 8px 0 4px; }
.countdown-card .sub { font-size: 11px; color: var(--slate-light); text-transform: uppercase; letter-spacing: 1.5px; }
.countdown-card .label { font-size: 13px; font-weight: 600; color: var(--slate); margin-top: 6px; }
.countdown-card .overdue-msg {
  font-size: 11px; font-weight: 700; color: var(--red-alarm); text-transform: uppercase;
  letter-spacing: 1px; margin-top: 4px; animation: pulse 1.5s infinite;
}
@keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.5; } }
.countdown-card.alarm { border: 2px solid var(--red-alarm); animation: alarm-glow 2s infinite; }
@keyframes alarm-glow { 0%,100% { box-shadow: 0 0 0 rgba(220,38,38,0); } 50% { box-shadow: 0 0 20px rgba(220,38,38,0.3); } }

/* ─── Tab bar ─── */
.tab-container { max-width: 920px; margin: 0 auto; padding: 0 24px; }
.tab-bar-wrap {
  border-radius: 12px 12px 0 0; overflow: hidden;
  background: rgba(255,255,255,0.95); backdrop-filter: blur(12px);
}
.tab-bar { display: flex; border-bottom: 2px solid var(--indigo-faint); }
.tab-btn {
  display: flex; align-items: center; gap: 8px; padding: 14px 20px;
  font-size: 14px; font-weight: 500; border: none; cursor: pointer;
  border-bottom: 3px solid transparent; color: var(--slate-light);
  background: transparent; transition: all 0.2s; margin-bottom: -2px; font-family: inherit;
}
.tab-btn.active { border-bottom-color: var(--indigo); color: var(--indigo); font-weight: 700; }
.tab-btn:hover:not(.active) { color: var(--slate); }
.content-wrap {
  background: rgba(255,255,255,0.97); backdrop-filter: blur(12px);
  border-radius: 0 0 16px 16px; padding: 24px; min-height: 400px;
  border: 1px solid rgba(255,255,255,0.6); border-top: none;
  box-shadow: 0 4px 24px rgba(0,0,0,0.1);
}
.tab-panel { display: none; }
.tab-panel.active { display: block; }

/* ─── Dashboard: Phase viewer ─── */
.phase-viewer { position: relative; }
.phase-viewer-header {
  display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px;
}
.phase-title-link {
  font-size: 18px; font-weight: 800; color: var(--indigo); cursor: pointer;
  text-decoration: none; border: none; background: none; font-family: inherit;
  display: flex; align-items: center; gap: 8px; transition: opacity 0.15s;
}
.phase-title-link:hover { opacity: 0.7; }
.phase-nav-btn {
  width: 36px; height: 36px; border-radius: 50%; border: 2px solid var(--indigo);
  background: var(--white); color: var(--indigo); cursor: pointer;
  display: flex; align-items: center; justify-content: center; transition: all 0.15s;
  font-size: 18px; font-family: inherit;
}
.phase-nav-btn:hover { background: var(--indigo); color: var(--white); }
.phase-nav-btn:disabled { opacity: 0.3; cursor: default; }
.phase-nav-btn:disabled:hover { background: var(--white); color: var(--indigo); }
.phase-due { font-size: 13px; color: var(--slate); }
.phase-due strong { color: var(--indigo); }
.phase-task-list { margin: 12px 0; }
.phase-task-item {
  display: flex; align-items: center; gap: 10px; padding: 8px 12px;
  border-radius: 8px; transition: background 0.15s; font-size: 14px;
}
.phase-task-item:hover { background: var(--indigo-faint); }
.phase-task-item.done { color: var(--slate-light); }
.phase-task-item.done .task-label { text-decoration: line-through; }
.phase-task-item .task-label { cursor: pointer; flex: 1; }
.phase-task-item .task-label:hover { color: var(--indigo); }
.phase-task-item .task-due-tag { font-size: 11px; color: var(--slate-light); white-space: nowrap; }
.phase-bar-track { height: 10px; background: #f0f0f0; border-radius: 5px; overflow: hidden; margin-top: 12px; }
.phase-bar-fill { height: 100%; border-radius: 5px; transition: width 0.5s; }
.phase-stats { display: flex; justify-content: space-between; margin-top: 8px; font-size: 13px; }

/* ─── Dashboard: Weekly rhythm ─── */
.rhythm-box { margin-top: 24px; border-radius: 14px; padding: 20px; background: var(--indigo-faint); border: 1px solid rgba(99,102,241,0.12); }
.rhythm-box h3 { font-size: 16px; font-weight: 700; color: var(--indigo); margin-bottom: 12px; }
.rhythm-item {
  display: flex; align-items: flex-start; gap: 10px; padding: 8px 10px;
  border-radius: 8px; cursor: pointer; transition: background 0.15s; font-size: 13px; color: var(--slate);
}
.rhythm-item:hover { background: rgba(99,102,241,0.06); }
.rhythm-item .r-check { flex-shrink: 0; margin-top: 1px; cursor: pointer; }
.rhythm-item.checked { color: var(--slate-light); }
.rhythm-item.checked .r-text { text-decoration: line-through; }

/* ─── Check-in detail panel ─── */
.checkin-detail {
  margin-top: 20px; border-radius: 14px; border: 2px solid var(--indigo);
  overflow: hidden; animation: slideDown 0.25s ease-out;
}
@keyframes slideDown { from { opacity: 0; max-height: 0; } to { opacity: 1; max-height: 2000px; } }
.checkin-detail-header {
  background: var(--indigo); color: var(--white); padding: 14px 20px;
  display: flex; justify-content: space-between; align-items: center;
}
.checkin-detail-header h4 { font-size: 16px; font-weight: 700; }
.checkin-close {
  background: none; border: none; color: var(--white); font-size: 20px;
  cursor: pointer; opacity: 0.7; transition: opacity 0.15s;
}
.checkin-close:hover { opacity: 1; }
.checkin-detail-body { padding: 20px; }
.checkin-agenda-item {
  display: flex; gap: 12px; padding: 10px 0; border-bottom: 1px solid #f0f0f0;
}
.checkin-agenda-item:last-child { border-bottom: none; }
.checkin-agenda-check { flex-shrink: 0; margin-top: 2px; cursor: pointer; }
.checkin-agenda-content { flex: 1; }
.checkin-agenda-label { font-size: 14px; font-weight: 600; color: var(--black); margin-bottom: 4px; }
.checkin-agenda-label.checked-label { color: var(--slate-light); text-decoration: line-through; }
.checkin-notes {
  width: 100%; min-height: 36px; border: 1px solid #e0e0e0; border-radius: 6px;
  padding: 6px 10px; font-family: inherit; font-size: 13px; color: var(--slate);
  resize: vertical; transition: border-color 0.15s;
}
.checkin-notes:focus { outline: none; border-color: var(--indigo); }

/* ─── Task detail overlay ─── */
.task-detail-overlay {
  position: fixed; top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0.5); z-index: 1000; display: flex;
  align-items: center; justify-content: center; padding: 24px;
  animation: fadeIn 0.2s;
}
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
.task-detail-panel {
  background: var(--white); border-radius: 16px; width: 100%; max-width: 700px;
  max-height: 90vh; overflow-y: auto; box-shadow: 0 20px 60px rgba(0,0,0,0.3);
}
.task-detail-top {
  background: linear-gradient(135deg, var(--indigo), var(--indigo-dark));
  color: var(--white); padding: 24px; border-radius: 16px 16px 0 0;
  position: relative;
}
.task-detail-top h2 { font-size: 20px; font-weight: 800; padding-right: 40px; }
.task-detail-top .due-badge {
  display: inline-block; background: rgba(255,255,255,0.2); border-radius: 6px;
  padding: 4px 10px; font-size: 12px; margin-top: 8px;
}
.task-detail-close {
  position: absolute; top: 20px; right: 20px; background: none; border: none;
  color: var(--white); font-size: 24px; cursor: pointer; opacity: 0.7;
}
.task-detail-close:hover { opacity: 1; }
.task-detail-body { padding: 24px; }
.task-section { margin-bottom: 20px; }
.task-section h3 {
  font-size: 14px; font-weight: 700; color: var(--indigo); text-transform: uppercase;
  letter-spacing: 1px; margin-bottom: 8px; padding-bottom: 6px;
  border-bottom: 2px solid var(--indigo-faint);
}
.task-section p { font-size: 14px; color: var(--slate); line-height: 1.6; }
.task-section ul { list-style: none; padding: 0; }
.task-section li {
  padding: 8px 0; border-bottom: 1px solid #f5f5f5; font-size: 13px; color: var(--slate);
  display: flex; align-items: center; gap: 8px;
}
.task-section li:last-child { border-bottom: none; }
.task-log-area {
  width: 100%; min-height: 100px; border: 2px solid #e0e0e0; border-radius: 10px;
  padding: 12px; font-family: inherit; font-size: 14px; color: var(--black);
  resize: vertical; transition: border-color 0.15s;
}
.task-log-area:focus { outline: none; border-color: var(--indigo); }
.task-status-bar { display: flex; gap: 8px; margin-top: 8px; }
.task-status-btn {
  padding: 6px 14px; border-radius: 8px; border: 2px solid #e0e0e0;
  background: var(--white); font-family: inherit; font-size: 13px; font-weight: 600;
  cursor: pointer; transition: all 0.15s;
}
.task-status-btn.active-status { border-color: var(--indigo); background: var(--indigo-faint); color: var(--indigo); }
.task-status-btn:hover { border-color: var(--indigo-light); }

/* ─── Upload drop zone ─── */
.upload-zone {
  border: 2px dashed #ccc; border-radius: 12px; padding: 24px 16px;
  text-align: center; color: var(--slate-light); cursor: pointer;
  transition: all 0.2s; background: #fafafa; position: relative;
}
.upload-zone:hover, .upload-zone.drag-over {
  border-color: var(--indigo); background: var(--indigo-faint); color: var(--indigo);
}
.upload-zone input[type="file"] {
  position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%;
}
.upload-zone-icon { font-size: 28px; margin-bottom: 6px; }
.upload-zone-text { font-size: 13px; font-weight: 600; }
.upload-zone-hint { font-size: 11px; margin-top: 4px; }
.uploaded-files-list { margin-top: 10px; text-align: left; }
.uploaded-file-item {
  display: flex; align-items: center; gap: 8px; padding: 8px 12px;
  background: var(--white); border: 1px solid #e5e5e5; border-radius: 8px;
  margin-bottom: 6px; font-size: 13px; transition: all 0.15s;
}
.uploaded-file-item:hover { border-color: var(--indigo-light); }
.uploaded-file-name { flex: 1; font-weight: 600; color: var(--slate); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.uploaded-file-size { color: var(--slate-light); font-size: 11px; }
.uploaded-file-remove {
  background: none; border: none; cursor: pointer; color: #aaa; font-size: 16px;
  padding: 2px 6px; border-radius: 4px; transition: all 0.15s;
}
.uploaded-file-remove:hover { color: #DC2626; background: #FEF2F2; }

/* ─── Timeline tasks ─── */
.phase-section { margin-bottom: 12px; border-radius: 12px; overflow: hidden; border: 1px solid #e5e5e5; }
.phase-section.open { border-color: rgba(99,102,241,0.25); }
.phase-hdr {
  width: 100%; display: flex; align-items: center; justify-content: space-between;
  padding: 14px 16px; background: var(--off-white); border: none; cursor: pointer; font-family: inherit;
}
.phase-section.open .phase-hdr { background: var(--indigo-faint); }
.phase-hdr:hover { background: #f0f0f0; }
.phase-tasks-list { padding: 12px; }
.tl-task {
  display: flex; align-items: flex-start; gap: 12px; padding: 10px 12px;
  border-radius: 8px; transition: all 0.25s;
}
.tl-task:hover { background: var(--indigo-faint); }
.tl-task-check { background: none; border: none; cursor: pointer; padding: 0; flex-shrink: 0; margin-top: 2px; }
.tl-task-body { flex: 1; min-width: 0; }
.tl-task-row { display: flex; align-items: center; gap: 8px; }
.tl-task-label {
  flex: 1; font-size: 14px; cursor: pointer; color: var(--black); transition: color 0.15s;
}
.tl-task-label:hover { color: var(--indigo); text-decoration: underline; }
.tl-task-label.done { color: var(--slate-light); text-decoration: line-through; }
.tl-task-due { font-size: 11px; color: var(--slate-light); white-space: nowrap; }

/* Pending Review state — filled radio, indigo accent */
.tl-task.status-pending_review { background: rgba(99,102,241,0.03); }
.tl-task.status-pending_review .tl-task-label { color: var(--indigo-dark); font-weight: 600; }
.tl-status-tag {
  display: inline-block; font-size: 10px; font-weight: 700; padding: 2px 8px;
  border-radius: 10px; white-space: nowrap; letter-spacing: 0.3px;
}
.tl-status-tag.review { background: rgba(99,102,241,0.1); color: var(--indigo); }
.tl-status-tag.in-progress { background: rgba(217,119,6,0.1); color: var(--amber); }

/* Complete state — greyed out with summary */
.tl-task.status-complete {
  background: rgba(0,0,0,0.02); opacity: 0.75;
}
.tl-task.status-complete:hover { background: rgba(0,0,0,0.04); transform: none; }
.tl-task.status-complete .tl-task-label {
  color: var(--slate); text-decoration: line-through; font-weight: 400;
}
.tl-task.status-complete .tl-task-due { color: var(--slate); opacity: 0.5; }
.tl-completion-summary {
  margin-top: 8px; padding: 10px 14px; background: rgba(22,163,74,0.04);
  border-left: 3px solid var(--emerald); border-radius: 0 8px 8px 0;
  font-size: 12px; color: var(--slate); line-height: 1.5;
}
.tl-completion-summary .summary-header {
  font-weight: 700; color: var(--emerald); font-size: 11px;
  text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px;
}
.tl-completion-summary .summary-item {
  display: flex; gap: 6px; margin-bottom: 4px; align-items: flex-start;
}
.tl-completion-summary .summary-item .summary-icon { flex-shrink: 0; font-size: 11px; }
.tl-completion-summary .summary-item .summary-text { font-size: 12px; }
.mini-bar { width: 100px; height: 6px; background: #e5e5e5; border-radius: 3px; overflow: hidden; }
.mini-fill { height: 100%; border-radius: 3px; transition: width 0.5s; }

/* ─── Footer ─── */
.footer {
  max-width: 920px; margin: 0 auto; padding: 20px 24px;

function createSVGHelix(canvas, size=44) {
  const ctx = canvas.getContext('2d');
  ctx.clearRect(0, 0, size, size);
  const time = (Date.now() % 3000) / 1000;
  const cx = size / 2, cy = size / 2, r = size / 5;
  const amp = size / 4;
  for (let i = 0; i < 6; i++) {
    const y = (cy - r) + i * 5;
    const angle = time * 2 + i * 0.5;
    const x1 = cx + amp * Math.sin(angle);
    const x2 = cx - amp * Math.sin(angle);
    const z1 = Math.cos(angle);
    const z2 = -Math.cos(angle);
    const sc1 = 0.5 + 0.5 * Math.max(0, z1);
    const sc2 = 0.5 + 0.5 * Math.max(0, z2);
    ctx.fillStyle = `rgba(99, 102, 241, ${sc1 * 0.8})`;
    ctx.beginPath();
    ctx.arc(x1, y, r * 0.6, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = `rgba(99, 102, 241, ${sc2 * 0.8})`;
    ctx.beginPath();
    ctx.arc(x2, y, r * 0.6, 0, Math.PI * 2);
    ctx.fill();
  }
  requestAnimationFrame(() => createSVGHelix(canvas, size));
}

/* ═══ HELPERS ═══ */
function getCurrentPhaseIdx() {
  const now = new Date();
  for (let i = 0; i < PHASES.length; i++) {
    if (PHASES[i].end > now) return i;
  }
  return PHASES.length - 1;
}

function phaseStats(idx) {
  const p = PHASES[idx];
  const total = p.tasks.length;
  const done = p.tasks.filter(t => S.tasks[t.id]).length;
  return {done, total, pct: Math.round(done * 100 / total)};
}

function totalStats() {
  const total = PHASES.flatMap(p => p.tasks).length;
  const done = PHASES.flatMap(p => p.tasks).filter(t => S.tasks[t.id]).length;
  return {done, total, pct: Math.round(done * 100 / total)};
}

function getTasksDueInWeek(weekDate) {
  const weekStart = new Date(weekDate);
  weekStart.setDate(weekStart.getDate() - weekStart.getDay());
  const weekEnd = new Date(weekStart);
  weekEnd.setDate(weekEnd.getDate() + 6);

  const tasks = [];
  PHASES.forEach(p => p.tasks.forEach(t => {
    const parts = t.due.match(/(\w+)\s+(\d+)/);
    if (parts) {
      const m = "Jan Feb Mar Apr May Jun Jul Aug Sep Oct Nov Dec".split(" ").indexOf(parts[1]);
      const d = new Date(2026, m, parseInt(parts[2]));
      if (d >= weekStart && d <= weekEnd) tasks.push({...t, dueDate: d, phase: p.name, status: S.taskStatus[t.id] || 'not_started', done: !!S.tasks[t.id]});
    }
  }));
  tasks.sort((a, b) => a.dueDate - b.dueDate);
  return tasks;
}

function getTasksDueNextWeek(weekDate) {
  const nextStart = new Date(weekDate);
  nextStart.setDate(nextStart.getDate() + 7);
  return getTasksDueInWeek(nextStart);
}

function selectCheckin(id) {
  selectedCheckin = selectedCheckin === id ? null : id;
  renderCheckins();
}

function toggleCheckinItem(wkId, key) {
  if (!S.checkinData[wkId]) S.checkinData[wkId] = {};
  S.checkinData[wkId][key + "_done"] = !S.checkinData[wkId][key + "_done"];
  save();
  renderCheckins();
}

function saveCheckinNote(wkId, key, val) {
  if (!S.checkinData[wkId]) S.checkinData[wkId] = {};
  S.checkinData[wkId][key + "_notes"] = val;
  save();
}

function markCheckinDone(id) {
  S.weeks[id] = !S.weeks[id];
  save();
  renderCheckins();
  renderCountdowns();
}

/* ═══ COUNTDOWNS ═══ */
function renderCountdowns() {
  const now = new Date();
  const wikiFreeze = WIKI_FREEZE;
  const jamboree = JAMBOREE;

  const daysToFreeze = Math.ceil((wikiFreeze - now) / (1000 * 60 * 60 * 24));
  const daysToJamboree = Math.ceil((jamboree - now) / (1000 * 60 * 60 * 24));

  let nextDeadline = null;
  for (const p of PHASES) {
    for (const t of p.tasks) {
      if (!S.tasks[t.id]) {
        const parts = t.due.match(/(\w+)\s+(\d+)/);
        if (parts) {
          const m = "Jan Feb Mar Apr May Jun Jul Aug Sep Oct Nov Dec".split(" ").indexOf(parts[1]);
          const d = new Date(2026, m, parseInt(parts[2]));
          if (d > now && (!nextDeadline || d < nextDeadline.date)) {
            nextDeadline = {date: d, task: t.text.substring(0, 40)};
          }
        }
      }
    }
  }

  const st = totalStats();

  let html = `
    <div class="countdown-card glass clickable" onclick="switchTab('timeline')">
      <div class="accent-bar" style="background:var(--indigo)"></div>
      <div class="big-num">${st.pct}%</div>
      <div class="sub">Overall Progress</div>
      <div class="label">${st.done}/${st.total} tasks</div>
    </div>`;

  if (nextDeadline) {
    const daysLeft = Math.ceil((nextDeadline.date - now) / (1000 * 60 * 60 * 24));
    const isOverdue = daysLeft < 0;
    const cardClass = daysLeft <= 3 && daysLeft > 0 ? 'alarm' : '';
    html += `
      <div class="countdown-card glass ${cardClass} clickable" onclick="switchTab('timeline')">
        <div class="accent-bar" style="background:${daysLeft <= 0 ? 'var(--red-alarm)' : 'var(--indigo)'}"></div>
        <div class="big-num" style="color:${isOverdue ? 'var(--red-alarm)' : 'var(--black)'}">${Math.abs(daysLeft)}</div>
        <div class="sub">Days ${isOverdue ? 'Overdue' : 'Left'}</div>
        <div class="label" style="font-size:12px">${nextDeadline.task}</div>
        ${isOverdue ? '<div class="overdue-msg">OVERDUE</div>' : ''}
      </div>`;
  }

  html += `
    <div class="countdown-card glass clickable" onclick="switchTab('checkins')">
      <div class="accent-bar" style="background:var(--indigo)"></div>
      <div class="big-num">${daysToFreeze}</div>
      <div class="sub">Days to Wiki Freeze</div>
      <div class="label">Sep 25</div>
    </div>
    <div class="countdown-card glass">
      <div class="accent-bar" style="background:#F6BE00"></div>
      <div class="big-num">${daysToJamboree}</div>
      <div class="sub">Days to Jamboree</div>
      <div class="label">Nov 13–16 Paris</div>
    </div>`;

  document.getElementById('countdownRow').innerHTML = html;
}

/* ═══ NOTIFICATIONS ═══ */
function getNotifications() {
  const data = localStorage.getItem(NOTIF_LS_KEY);
  return data ? JSON.parse(data) : [];
}

function saveNotifications(notifs) {
  localStorage.setItem(NOTIF_LS_KEY, JSON.stringify(notifs));
}

function getMyNotifications() {
  return getNotifications().filter(n => n.to === MY_ROLE);
}

function sendNotification(toRole, type, message, taskId = null) {
  const notifs = getNotifications();
  notifs.push({
    id: 'notif_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9),
    to: toRole,
    type: type,
    message: message,
    taskId: taskId,
    timestamp: Date.now(),
    read: false
  });
  saveNotifications(notifs);
  renderNotifWidget();
}

function renderNotifWidget() {
  const unread = getMyNotifications().filter(n => !n.read);
  const badge = document.getElementById('notif-badge');
  const title = document.getElementById('notif-title');
  const sub = document.getElementById('notif-sub');

  if (unread.length === 0) {
    badge.style.display = 'none';
    title.textContent = 'All caught up';
    sub.textContent = 'No new messages';
    document.getElementById('notif-widget').classList.remove('has-new');
  } else {
    badge.style.display = 'flex';
    badge.textContent = unread.length;
    title.textContent = unread.length + ' new message' + (unread.length > 1 ? 's' : '');
    sub.textContent = unread[0].message.replace(/<[^>]*>/g, '').substring(0, 60) + '...';
    document.getElementById('notif-widget').classList.add('has-new');
  }
}

function openNotifPanel() {
  const list = document.getElementById('notif-list');
  const unread = getMyNotifications().filter(n => !n.read);
  if (unread.length === 0) {
    list.innerHTML = '<div class="notif-empty">All caught up — no new notifications!</div>';
  } else {
    list.innerHTML = unread.map(n => {
      const iconMap = {
        approve: {icon: '✅', cls: 'approve'},
        return: {icon: '🔄', cls: 'return'},
        checkin: {icon: '📋', cls: 'checkin'},
        notes: {icon: '📝', cls: 'notes'},
        submit: {icon: '📤', cls: 'submit'},
        file: {icon: '📎', cls: 'file'},
        urgent: {icon: '🚨', cls: 'return'}
      };
      const ic = iconMap[n.type] || {icon: '🔔', cls: 'notes'};
      const timeAgo = formatTimeAgo(n.timestamp);
      return `<div class="notif-item unread" onclick="handleNotifClick('${n.id}'${n.taskId ? ",'" + n.taskId + "'" : ''})">
        <div class="notif-item-icon ${ic.cls}">${ic.icon}</div>
        <div class="notif-item-body">
          <div class="notif-item-msg">${n.message}</div>
          <div class="notif-item-time">${timeAgo}</div>
        </div>
      </div>`;
    }).join('');
  }
  document.getElementById('notif-panel-overlay').classList.add('open');
}

function closeNotifPanel() {
  document.getElementById('notif-panel-overlay').classList.remove('open');
  renderNotifWidget();
}

function handleNotifClick(notifId, taskId) {
  const notifs = getNotifications();
  const n = notifs.find(x => x.id === notifId);
  if (n) {n.read = true; saveNotifications(notifs);}
  closeNotifPanel();
  if (taskId) {
    switchTab('timeline');
    setTimeout(() => openTaskDetail(taskId), 200);
  }
}

function markAllNotifsRead() {
  const notifs = getNotifications();
  notifs.forEach(n => {if (n.to === MY_ROLE) n.read = true;});
  saveNotifications(notifs);
  openNotifPanel();
  renderNotifWidget();
}

function formatTimeAgo(ts) {
  const diff = Date.now() - ts;
  const mins = Math.floor(diff / 60000);
  if (mins < 1) return 'Just now';
  if (mins < 60) return mins + 'm ago';
  const hrs = Math.floor(mins / 60);
  if (hrs < 24) return hrs + 'h ago';
  const days = Math.floor(hrs / 24);
  return days + 'd ago';
}

/* ═══ ACTIVITY LOG ═══ */
function logActivity(type, action, details, metadata = {}) {
  if (!S.activityLog) S.activityLog = [];
  S.activityLog.push({
    type: type,
    action: action,
    details: details,
    timestamp: Date.now(),
    metadata: metadata
  });
  save();
  if (currentTab === 'activity') renderActivity();
}

/* ═══ INIT ═══ */
renderTabs();
renderPanel();
renderCountdowns();
renderNotifWidget();
setInterval(renderCountdowns, 60000);
</script>
